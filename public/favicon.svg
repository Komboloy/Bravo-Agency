<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>BRAVO! Agency</title>
  <!-- Rounded square in BRAVO color -->
  <rect width="64" height="64" rx="14" ry="14" fill="#4923F4"/>
  <!-- Subtle inner highlight at the top for liquid-glass feel -->
  <rect x="2" y="2" width="60" height="20" rx="12" ry="12" fill="white" fill-opacity="0.08"/>
  <!-- "B!" wordmark — heavy weight, paper color -->
  <text
    x="50%"
    y="58%"
    dominant-baseline="middle"
    text-anchor="middle"
    fill="#f3ecde"
    font-family="Helvetica Neue, Arial Black, sans-serif"
    font-weight="900"
    font-size="44"
    letter-spacing="-2"
  >B!</text>
</svg>
